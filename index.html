<!DOCTYPE html>
<html lang="en">
<head>
<link rel="icon" href="/todo-workstream/favicon.ico" type="image/x-icon">
<link rel="icon" href="/todo-workstream/favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Do</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #b8bcc0;
    --card: #cdd0d4;
    --ink: #1a1a1a;
    --muted: #555c63;
    --accent: #e05a2b;
    --accent2: #3a6b4a;
    --border: #9fa5ab;
    --done-bg: #c2ccc5;
    --high-bg: #e8bab0;
    --high-border: #d4917f;
    --high-label: #b5432a;
    --med-bg: #e8ddb0;
    --med-border: #d4c97f;
    --med-label: #8a7a1e;
    --low-bg: #b0cce8;
    --low-border: #7fa8d4;
    --low-label: #2a5e8a;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 40px 24px;
    user-select: none;
  }

  /* ── Tab Navigation ──────────────────────────────────────────── */
  .tab-bar {
    max-width: 640px;
    margin: 0 auto 24px;
    display: flex;
    gap: 0;
    border-bottom: 2px solid var(--border);
  }

  .tab-btn {
    flex: 1;
    padding: 10px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.02em;
    text-align: center;
  }

  .tab-btn:hover {
    color: var(--ink);
  }

  .tab-btn.active {
    color: var(--ink);
    border-bottom-color: #2e3236;
  }

  /* ── Header ──────────────────────────────────────────────────── */
  header {
    max-width: 640px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .header-left {
    flex: 1;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--ink);
  }

  header p {
    margin-top: 6px;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
  }

  /* ── Date Badge ──────────────────────────────────────────────── */
  .date-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 12px;
    background: #2e3236;
    color: #e8e4dc;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }

  .date-badge:hover {
    background: #444a50;
  }

  .date-badge svg {
    opacity: 0.7;
  }

  /* ── Day Nav Pill ────────────────────────────────────────────── */
  .day-nav-pill {
    display: inline-flex;
    align-items: stretch;
    background: #2e3236;
    border-radius: 99px;
    overflow: hidden;
    margin-top: 12px;
  }

  .day-nav-btn {
    background: transparent;
    color: #e8e4dc;
    border: none;
    width: 26px;
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    line-height: 1;
    padding: 5px 0;
  }

  .day-nav-btn:hover {
    background: #444a50;
  }

  .day-nav-btn:active {
    background: #1a1e21;
  }

  .day-nav-divider {
    width: 1px;
    background: #4a5058;
    margin: 4px 0;
  }

  /* ── Calendar Popover ────────────────────────────────────────── */
  .cal-popover {
    display: none;
    position: absolute;
    z-index: 200;
    background: #cdd0d4;
    border: 1.5px solid #9fa5ab;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    width: 260px;
    margin-top: 8px;
  }

  .cal-popover.open {
    display: block;
    animation: slideUp 0.2s ease;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .cal-header span {
    font-weight: 600;
    font-size: 0.9rem;
    color: var(--ink);
  }

  .cal-nav {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 1.1rem;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.2s, color 0.2s;
    line-height: 1;
  }

  .cal-nav:hover {
    background: #b8bcc0;
    color: var(--ink);
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }

  .cal-day-label {
    text-align: center;
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    padding: 4px 0;
  }

  .cal-day {
    text-align: center;
    font-size: 0.82rem;
    padding: 5px 2px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--ink);
    transition: background 0.15s;
  }

  .cal-day:hover {
    background: #b8bcc0;
  }

  .cal-day.other-month {
    color: var(--border);
  }

  .cal-day.today {
    font-weight: 700;
    color: var(--accent2);
  }

  .cal-day.selected {
    background: #2e3236;
    color: #e8e4dc;
    font-weight: 600;
  }

  .cal-day.selected:hover {
    background: #444a50;
  }

  /* ── Add Button ──────────────────────────────────────────────── */
  .add-btn {
    margin-top: 6px;
    flex-shrink: 0;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #111111;
    color: white;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    line-height: 1;
  }

  .add-btn:hover {
    background: #333333;
    transform: scale(1.08);
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }

  /* ── Section Manager Button ──────────────────────────────────── */
  .section-mgr-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    background: #2e3236;
    color: #e8e4dc;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
  }

  .section-mgr-btn:hover {
    background: #444a50;
  }

  /* ── Progress ────────────────────────────────────────────────── */
  .progress-bar-wrap {
    margin-top: 14px;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
    max-width: 640px;
    margin-left: auto;
    margin-right: auto;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    max-width: 640px;
    margin: 6px auto 0;
    font-size: 0.78rem;
    color: var(--muted);
    text-align: right;
  }

  /* ── Sync Status ─────────────────────────────────────────────── */
  .sync-status {
    max-width: 640px;
    margin: 4px auto 0;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    height: 14px;
    transition: color 0.3s;
  }

  .sync-status.syncing { color: #888; }
  .sync-status.synced { color: var(--accent2); }
  .sync-status.error { color: var(--accent); }

  /* ── List & Empty State ──────────────────────────────────────── */
  .list {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .empty-state {
    max-width: 640px;
    margin: 32px auto;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    font-weight: 300;
    padding: 40px 20px;
    border: 1.5px dashed var(--border);
    border-radius: 16px;
  }

  .empty-state span {
    display: block;
    font-size: 2rem;
    margin-bottom: 10px;
  }

  /* ── Section Labels ──────────────────────────────────────────── */
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin: 18px 0 4px 4px;
  }

  .section-label.completed-label {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* ── Task Card ───────────────────────────────────────────────── */
  .task {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    position: relative;
    cursor: grab;
    transition: border-color 0.2s, background 0.2s, opacity 0.2s;
    animation: fadeUp 0.3s ease both;
  }

  .task:active { cursor: grabbing; }
  .task:hover { border-color: #9fa5ab; }
  .task:hover .delete-btn,
  .task:hover .forward-btn,
  .task:hover .edit-btn { opacity: 1; }

  .task.done {
    background: var(--done-bg);
    border-color: #bcd5c6;
  }

  .task.done .task-title {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task.done .task-sub {
    color: #b0c4b8;
  }

  .task.dragging {
    opacity: 0.3;
    cursor: grabbing;
  }

  /* ── Priority Colors ─────────────────────────────────────────── */
  .task.priority-high { background: var(--high-bg); border-color: var(--high-border); }
  .task.priority-high.done { background: #d9c5c0; border-color: #c4aea6; }
  .task.priority-med { background: var(--med-bg); border-color: var(--med-border); }
  .task.priority-med.done { background: #d9d5c0; border-color: #c4bfa6; }
  .task.priority-low { background: var(--low-bg); border-color: var(--low-border); }
  .task.priority-low.done { background: #c0cbd9; border-color: #a6b4c4; }

  .priority-badge {
    display: inline-block;
    font-size: 0.6rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    border-radius: 4px;
    margin-left: 8px;
    vertical-align: middle;
  }

  .priority-badge.high { background: var(--high-label); color: #fff; }
  .priority-badge.med { background: var(--med-label); color: #fff; }
  .priority-badge.low { background: var(--low-label); color: #fff; }

  /* ── Priority Section Labels ─────────────────────────────────── */
  .section-label.priority-section {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 4px 10px;
    border-radius: 6px;
    margin-top: 6px;
    margin-bottom: 4px;
    display: inline-block;
  }

  .section-label.priority-high-label { background: var(--high-bg); color: var(--high-label); border: 1px solid var(--high-border); }
  .section-label.priority-med-label { background: var(--med-bg); color: var(--med-label); border: 1px solid var(--med-border); }
  .section-label.priority-low-label { background: var(--low-bg); color: var(--low-label); border: 1px solid var(--low-border); }

  /* ── Forwarded Badge ─────────────────────────────────────────── */
  .forwarded-badge {
    display: inline-block;
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    background: #2e3236;
    color: #e8e4dc;
    padding: 1px 7px;
    border-radius: 99px;
    margin-left: 8px;
    vertical-align: middle;
  }

  /* ── Drag Ghost ──────────────────────────────────────────────── */
  .drag-ghost {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 14px 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    box-shadow: 0 16px 48px rgba(0,0,0,0.28), 0 4px 12px rgba(0,0,0,0.15);
    transform: rotate(2deg) scale(1.03);
    max-width: 600px;
    min-width: 300px;
  }

  .drop-indicator {
    height: 3px;
    background: #2e3236;
    border-radius: 99px;
    margin: 2px 0;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .drop-indicator.active { opacity: 1; }

  /* ── Checkbox ────────────────────────────────────────────────── */
  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2px solid var(--border);
    background: #cdd0d4;
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
    cursor: pointer;
  }

  .task.done .checkbox {
    background: var(--accent2);
    border-color: var(--accent2);
  }

  .checkbox svg { opacity: 0; transition: opacity 0.2s; }
  .task.done .checkbox svg { opacity: 1; }

  /* ── Task Body ───────────────────────────────────────────────── */
  .task-body { flex: 1; }

  .task-title {
    font-size: 1.2rem;
    font-weight: 500;
    transition: color 0.2s;
  }

  .task-sub {
    font-size: 0.9rem;
    color: var(--ink);
    margin-top: 3px;
    font-weight: 300;
    transition: color 0.2s;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  /* ── Task Actions ────────────────────────────────────────────── */
  .task-actions {
    display: flex;
    align-items: flex-start;
    gap: 2px;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .delete-btn,
  .forward-btn,
  .edit-btn {
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 6px;
    transition: opacity 0.2s, color 0.2s, background 0.2s;
    line-height: 1;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .delete-btn { color: var(--muted); font-size: 1rem; }
  .delete-btn:hover { color: var(--accent); background: rgba(224,90,43,0.12); }
  .forward-btn { color: var(--muted); }
  .forward-btn:hover { color: #2e3236; background: rgba(46,50,54,0.1); }
  .forward-btn svg { width: 15px; height: 15px; }
  .edit-btn { color: var(--muted); }
  .edit-btn:hover { color: #2e3236; background: rgba(46,50,54,0.1); }
  .edit-btn svg { width: 14px; height: 14px; }

  /* ── Modal ───────────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.2s ease;
  }

  .modal {
    background: var(--card);
    border-radius: 18px;
    padding: 28px 28px 24px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: slideUp 0.25s ease;
  }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 18px;
    color: var(--ink);
  }

  .modal label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .modal input,
  .modal select,
  .modal textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    background: #cdd0d4;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .modal textarea {
    resize: vertical;
    min-height: 60px;
    max-height: 300px;
    line-height: 1.5;
  }

  .modal input:focus,
  .modal select:focus,
  .modal textarea:focus {
    border-color: #2e3236;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 4px;
  }

  .btn-cancel {
    flex: 1;
    padding: 10px;
    border: 1.5px solid var(--border);
    border-radius: 9px;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-cancel:hover { background: #b8bcc0; }

  .btn-add {
    flex: 2;
    padding: 10px;
    border: none;
    border-radius: 9px;
    background: #111111;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-add:hover { background: #333333; }

  /* ── Section Manager List ────────────────────────────────────── */
  .section-mgr-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 250px;
    overflow-y: auto;
  }

  .section-mgr-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 500;
  }

  .section-mgr-item span {
    flex: 1;
  }

  .section-mgr-item button {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.85rem;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }

  .section-mgr-item .edit-section-btn:hover {
    color: #2e3236;
    background: rgba(46,50,54,0.1);
  }

  .section-mgr-item .delete-section-btn:hover {
    color: var(--accent);
    background: rgba(224,90,43,0.12);
  }

  .section-mgr-add {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }

  .section-mgr-add input {
    flex: 1;
    margin-bottom: 0;
  }

  .section-mgr-add button {
    padding: 8px 16px;
    background: #2e3236;
    color: #e8e4dc;
    border: none;
    border-radius: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .section-mgr-add button:hover {
    background: #444a50;
  }

  /* ── Toast ───────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #2e3236;
    color: #e8e4dc;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 0.82rem;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 500;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Loading ─────────────────────────────────────────────────── */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    transition: opacity 0.4s;
  }

  .loading-overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: #2e3236;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  /* ── Clock Widget ──────────────────────────────────────────── */
  .clock-widget {
    flex-shrink: 0;
    text-align: right;
    margin-top: 4px;
  }

  .clock-widget .DPDC {
    width: auto;
    padding: 0;
    background-color: transparent;
    border: none;
    border-radius: 0;
  }

  .clock-widget .DPDCh {
    display: none;
  }

  .clock-widget .DPDCt {
    font-size: 28px;
    color: var(--ink);
    font-weight: 700;
    line-height: 1;
  }

  .clock-widget .DPDCd {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 400;
    margin-top: 2px;
  }

  .clock-widget .DPl {
    opacity: 0 !important;
    pointer-events: none !important;

<script>
  // ── Supabase ──────────────────────────────────────────────────
  const SUPABASE_URL = 'https://arndpirxpnaoelmbidtz.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_-00lJ2yGPHTgbIXa0LvO6A_Iv_c9KEN';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // ── Active Tab ────────────────────────────────────────────────
  let activeTab = 'work';
  let personalSections = [];

  function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tabWork').classList.toggle('active', tab === 'work');
    document.getElementById('tabPersonal').classList.toggle('active', tab === 'personal');
    if (tab === 'work') {
      document.getElementById('pageTitle').textContent = 'Work';
      document.getElementById('pageSubtitle').textContent = 'Track outstanding tasks and action items';
      document.getElementById('sectionMgrBtn').style.display = 'none';
    } else {
      document.getElementById('pageTitle').textContent = 'Personal';
      document.getElementById('pageSubtitle').textContent = 'Personal tasks and reminders';
      document.getElementById('sectionMgrBtn').style.display = 'inline-flex';
    }
    loadTasks();
  }

  function setSyncStatus(state, msg) {
    const el = document.getElementById('syncStatus');
    el.className = 'sync-status ' + state;
    el.textContent = msg;
  }

  function togglePrioritySelect() {
    const cat = document.getElementById('taskCategory').value;
    document.getElementById('priorityGroup').style.display =
      cat === 'Action Items' ? 'block' : 'none';
  }

  // ── Personal Sections (synced via Supabase) ────────────────────
  async function loadPersonalSections() {
    const { data, error } = await db
      .from('personal_sections')
      .select('*')
      .order('position', { ascending: true });

    if (error) {
      console.error('Failed to load sections:', error);
      personalSections = ['General'];
      return;
    }

    if (!data || data.length === 0) {
      // Insert a default section if the table is empty
      await db.from('personal_sections').insert([{ name: 'General', position: 0 }]);
      personalSections = ['General'];
    } else {
      personalSections = data.map(row => row.name);
    }
  }

  function populateSectionDropdown(selectId) {
    const sel = document.getElementById(selectId);
    sel.innerHTML = '';
    personalSections.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      sel.appendChild(opt);
    });
  }

  // ── Section Manager ───────────────────────────────────────────
  function openSectionMgr() {
    renderSectionMgrList();
    document.getElementById('sectionMgrOverlay').classList.add('open');
    document.getElementById('newSectionName').value = '';
  }

  function closeSectionMgr() {
    document.getElementById('sectionMgrOverlay').classList.remove('open');
    loadTasks();
  }

  function renderSectionMgrList() {
    const list = document.getElementById('sectionMgrList');
    list.innerHTML = '';
    personalSections.forEach((s, i) => {
      const item = document.createElement('div');
      item.className = 'section-mgr-item';
      item.innerHTML = `
        <span>${escapeHtml(s)}</span>
        <button class="edit-section-btn" onclick="editPersonalSection(${i})" title="Rename">✎</button>
        <button class="delete-section-btn" onclick="deletePersonalSection(${i})" title="Delete">✕</button>
      `;
      list.appendChild(item);
    });
  }

  async function addPersonalSection() {
    const input = document.getElementById('newSectionName');
    const name = input.value.trim();
    if (!name) {
      input.focus();
      return;
    }
    if (personalSections.includes(name)) {
      showToast('Section already exists');
      return;
    }

    const newPos = personalSections.length;
    const { error } = await db.from('personal_sections').insert([{
      name: name,
      position: newPos
    }]);

    if (error) {
      showToast('Failed to add section');
      console.error('Add section error:', error);
      return;
    }

    personalSections.push(name);
    renderSectionMgrList();
    input.value = '';
    showToast('Section added');
  }

  async function editPersonalSection(index) {
    const oldName = personalSections[index];
    const newName = prompt('Rename section:', oldName);
    if (newName && newName.trim() && newName.trim() !== oldName) {
      const trimmed = newName.trim();
      if (personalSections.includes(trimmed)) {
        showToast('Section already exists');
        return;
      }

      // Update section name in personal_sections table
      const { error: secError } = await db
        .from('personal_sections')
        .update({ name: trimmed })
        .eq('name', oldName);

      if (secError) {
        showToast('Failed to rename section');
        console.error('Rename section error:', secError);
        return;
      }

      // Update tasks that had the old section name
      await db.from('tasks')
        .update({ category: trimmed })
        .eq('category', oldName)
        .eq('tab', 'personal');

      personalSections[index] = trimmed;
      renderSectionMgrList();
      showToast('Section renamed');
    }
  }

  async function deletePersonalSection(index) {
    if (personalSections.length <= 1) {
      showToast('Must have at least one section');
      return;
    }
    const name = personalSections[index];
    const fallback = personalSections[0] === name
      ? personalSections[1]
      : personalSections[0];

    if (!confirm(`Delete section "${name}"? Tasks in this section will be moved to "${fallback}".`)) {
      return;
    }

    // Move tasks to fallback section
    await db.from('tasks')
      .update({ category: fallback })
      .eq('category', name)
      .eq('tab', 'personal');

    // Delete from personal_sections table
    const { error } = await db
      .from('personal_sections')
      .delete()
      .eq('name', name);

    if (error) {
      showToast('Failed to delete section');
      console.error('Delete section error:', error);
      return;
    }

    personalSections.splice(index, 1);
    renderSectionMgrList();
    showToast('Section deleted');
  }

  document.getElementById('newSectionName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addPersonalSection();
  });

  // ── Date ──────────────────────────────────────────────────────
  const realToday = new Date();
  realToday.setHours(0, 0, 0, 0);
  let selectedDate = new Date(realToday);
  let calViewYear = selectedDate.getFullYear();
  let calViewMonth = selectedDate.getMonth();

  const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DAYS_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  function formatShortDate(d) {
    return `${MONTH_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }

  function formatBadge(d) {
    return `${DAYS_FULL[d.getDay()]} · ${MONTH_SHORT[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  }

  function updateBadge() {
    document.getElementById('dateBadgeText').textContent = formatBadge(selectedDate);
  }

  function toggleCal() {
    const pop = document.getElementById('calPopover');
    if (pop.classList.contains('open')) { pop.classList.remove('open'); return; }
    calViewYear = selectedDate.getFullYear();
    calViewMonth = selectedDate.getMonth();
    renderCal();
    pop.classList.add('open');
  }

  function changeMonth(dir) {
    calViewMonth += dir;
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    renderCal();
  }

  function renderCal() {
    document.getElementById('calMonthLabel').textContent = `${MONTH_NAMES[calViewMonth]} ${calViewYear}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    DAY_NAMES.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-label';
      el.textContent = d[0];
      grid.appendChild(el);
    });
    const first = new Date(calViewYear, calViewMonth, 1);
    const startDay = first.getDay();
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
    const daysInPrev = new Date(calViewYear, calViewMonth, 0).getDate();
    for (let i = startDay - 1; i >= 0; i--) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = daysInPrev - i;
      grid.appendChild(el);
    }
    for (let d = 1; d <= daysInMonth; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day';
      el.textContent = d;
      const thisDate = new Date(calViewYear, calViewMonth, d);
      if (thisDate.toDateString() === realToday.toDateString()) el.classList.add('today');
      if (thisDate.toDateString() === selectedDate.toDateString()) el.classList.add('selected');
      el.onclick = () => pickDate(calViewYear, calViewMonth, d);
      grid.appendChild(el);
    }
    const filled = startDay + daysInMonth;
    const remaining = filled % 7 === 0 ? 0 : 7 - (filled % 7);
    for (let d = 1; d <= remaining; d++) {
      const el = document.createElement('div');
      el.className = 'cal-day other-month';
      el.textContent = d;
      grid.appendChild(el);
    }
  }

  function pickDate(y, m, d) {
    selectedDate = new Date(y, m, d);
    updateBadge();
    document.getElementById('calPopover').classList.remove('open');
    loadTasks();
  }

  function shiftDay(dir) {
    selectedDate.setDate(selectedDate.getDate() + dir);
    updateBadge();
    loadTasks();
  }

  document.addEventListener('click', function(e) {
    const pop = document.getElementById('calPopover');
    const badge = document.getElementById('dateBadge');
    if (!pop.contains(e.target) && !badge.contains(e.target)) pop.classList.remove('open');
  });

  updateBadge();

  // ── Toast ─────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Drag & Drop ───────────────────────────────────────────────
  let dragEl = null, ghost = null, offsetX = 0, offsetY = 0, currentIndicator = null;

  function initDrag(task) {
    task.addEventListener('mousedown', onMouseDown);
    task.addEventListener('touchstart', onTouchStart, { passive: false });
  }

  function onMouseDown(e) {
    if (e.target.closest('.checkbox') || e.target.closest('.delete-btn') ||
        e.target.closest('.forward-btn') || e.target.closest('.edit-btn')) return;
    e.preventDefault();
    startDrag(e.currentTarget, e.clientX, e.clientY);
  }

  function onTouchStart(e) {
    if (e.target.closest('.checkbox') || e.target.closest('.delete-btn') ||
        e.target.closest('.forward-btn') || e.target.closest('.edit-btn')) return;
    e.preventDefault();
    const t = e.touches[0];
    startDrag(e.currentTarget, t.clientX, t.clientY);
  }

  function startDrag(el, clientX, clientY) {
    dragEl = el;
    const rect = el.getBoundingClientRect();
    offsetX = clientX - rect.left;
    offsetY = clientY - rect.top;
    ghost = document.createElement('div');
    ghost.className = 'drag-ghost';
    ghost.innerHTML = el.innerHTML;
    ghost.style.width = rect.width + 'px';
    document.body.appendChild(ghost);
    positionGhost(clientX, clientY);
    dragEl.classList.add('dragging');
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }

  function onMouseMove(e) { drag(e.clientX, e.clientY); }

  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    drag(t.clientX, t.clientY);
  }

  function drag(clientX, clientY) {
    positionGhost(clientX, clientY);
    updateDropIndicator(clientX, clientY);
  }

  function positionGhost(clientX, clientY) {
    ghost.style.left = (clientX - offsetX) + 'px';
    ghost.style.top = (clientY - offsetY) + 'px';
  }

  function updateDropIndicator(clientX, clientY) {
    clearIndicator();
    const list = document.getElementById('taskList');
    const items = [...list.children].filter(c =>
      c !== dragEl && !c.classList.contains('drop-indicator')
    );
    let best = null, bestDist = Infinity;
    items.forEach(item => {
      const r = item.getBoundingClientRect();
      const midY = r.top + r.height / 2;
      const dist = Math.abs(clientY - midY);
      if (dist < bestDist) { bestDist = dist; best = { item, above: clientY < midY }; }
    });
    if (best) {
      const ind = document.createElement('div');
      ind.className = 'drop-indicator active';
      currentIndicator = ind;
      best.above ? list.insertBefore(ind, best.item) : best.item.after(ind);
    }
  }

  function clearIndicator() {
    if (currentIndicator) { currentIndicator.remove(); currentIndicator = null; }
    document.querySelectorAll('.drop-indicator').forEach(d => d.remove());
  }

  function onMouseUp() { drop(); }
  function onTouchEnd() { drop(); }

  async function drop() {
    document.removeEventListener('mousemove', onMouseMove);
    document.removeEventListener('mouseup', onMouseUp);
    document.removeEventListener('touchmove', onTouchMove);
    document.removeEventListener('touchend', onTouchEnd);
    if (!dragEl) return;
    const list = document.getElementById('taskList');
    if (currentIndicator) list.insertBefore(dragEl, currentIndicator);
    clearIndicator();
    dragEl.classList.remove('dragging');
    ghost.remove();
    ghost = null;
    const moved = dragEl;
    dragEl = null;
    cleanEmptySections();
    updateProgress();
    checkEmpty();
    await savePositions();
  }
  // ── Save Positions ────────────────────────────────────────────
  async function savePositions() {
    const list = document.getElementById('taskList');
    const children = [...list.children];
    let currentCategory = (activeTab === 'personal') ? (personalSections[0] || 'General') : 'General';
    let currentPriority = null;
    const updates = [];
    let pos = 0;

    children.forEach(child => {
      if (child.classList.contains('section-label')) {
        if (child.dataset.priorityZone) {
          // Priority zone label: update priority AND category
          // (priority zones always belong to a specific category)
          currentPriority = child.dataset.priorityZone;
          if (child.dataset.sectionCategory) {
            currentCategory = child.dataset.sectionCategory;
          }
        } else if (child.classList.contains('completed-label')) {
          // don't change category for completed section
        } else {
          // Regular section label: update category, reset priority
          currentCategory = child.dataset.sectionCategory || child.textContent;
          currentPriority = null;
        }
      } else if (child.classList.contains('task') && child.dataset.id) {
        const taskCat = currentCategory;
        // Only assign priority if category supports it
        let taskPri = null;
        if (activeTab === 'work') {
          // On work tab, only Action Items get priority
          taskPri = (taskCat === 'Action Items') ? currentPriority : null;
        } else {
          // On personal tab, all sections support priority
          taskPri = currentPriority;
        }

        updates.push({
          id: child.dataset.id,
          position: pos,
          category: taskCat,
          priority: taskPri
        });

        // Live-update styling
        child.classList.remove('priority-high', 'priority-med', 'priority-low');
        child.dataset.priority = taskPri || '';
        child.dataset.category = taskCat;

        if (taskPri) {
          child.classList.add('priority-' + taskPri.toLowerCase());
          const oldBadge = child.querySelector('.priority-badge');
          if (oldBadge) oldBadge.remove();
          const titleEl = child.querySelector('.task-title');
          if (titleEl) {
            const badge = document.createElement('span');
            badge.className = 'priority-badge ' + taskPri.toLowerCase();
            badge.textContent = taskPri;
            titleEl.appendChild(badge);
          }
        } else {
          const oldBadge = child.querySelector('.priority-badge');
          if (oldBadge) oldBadge.remove();
        }
        pos++;
      }
    });

    setSyncStatus('syncing', '⟳ Saving order...');
    try {
      await Promise.all(updates.map(u =>
        db.from('tasks').update({
          position: u.position,
          category: u.category,
          priority: u.priority
        }).eq('id', u.id)
      ));
      setSyncStatus('synced', '✓ Synced');
      setTimeout(() => setSyncStatus('', ''), 2000);
    } catch (err) {
      setSyncStatus('error', '✕ Sync failed');
      console.error('Position save error:', err);
    }
  }

  // ── Render Task from DB Row ───────────────────────────────────
  function createTaskEl(row) {
    const task = document.createElement('div');
    const priority = row.priority || '';
    let priorityClass = '';
    if (priority === 'HIGH') priorityClass = ' priority-high';
    else if (priority === 'MED') priorityClass = ' priority-med';
    else if (priority === 'LOW') priorityClass = ' priority-low';

    task.className = 'task' + (row.done ? ' done' : '') + priorityClass;
    task.dataset.id = row.id;
    task.dataset.fwdCount = row.fwd_count || 0;
    task.dataset.originDate = row.origin_date || '';
    task.dataset.displayDate = row.display_date || row.origin_date || '';
    task.dataset.priority = priority;
    task.dataset.category = row.category || '';
    task.dataset.tab = row.tab || 'work';

    const fwdCount = row.fwd_count || 0;
    const fwdBadge = fwdCount > 0
      ? `<span class="forwarded-badge">↪ Forwarded x${fwdCount}</span>`
      : '';

    let priBadge = '';
    if (priority) {
      const priClass = priority.toLowerCase();
      priBadge = `<span class="priority-badge ${priClass}">${priority}</span>`;
    }

    task.innerHTML = `
      <div class="checkbox" onclick="toggleTask(this.parentElement)">
        <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1" stroke="white" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-body">
        <div class="task-title">
          ${escapeHtml(row.name)}${fwdBadge}${priBadge}
        </div>
        <div class="task-sub">${escapeHtml(row.note || '')}</div>
        <div style="font-size:0.72rem; color:var(--muted); margin-top:4px;
                    font-weight:300; font-style:italic; opacity:0.75;">
          Added ${escapeHtml(row.origin_date || '')}
        </div>
      </div>
      <div class="task-actions">
        <button class="edit-btn" onclick="openEditModal(this.closest('.task'))" title="Edit">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M11.5 1.5l3 3L5 14H2v-3L11.5 1.5z"/>
          </svg>
        </button>
        <button class="forward-btn" onclick="forwardTask(this.closest('.task'))" title="Forward to tomorrow">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 8h10M9 4l4 4-4 4"/>
          </svg>
        </button>
        <button class="delete-btn" onclick="deleteTask(this.closest('.task'))" title="Remove">✕</button>
      </div>
    `;

    initDrag(task);
    return task;
  }

  // ── Render All Tasks ──────────────────────────────────────────
  function renderAllTasks(rows) {
    const list = document.getElementById('taskList');
    list.innerHTML = '';
    const currentDateStr = formatShortDate(selectedDate);
    const sorted = [...rows].sort((a, b) => (a.position ?? 0) - (b.position ?? 0));

    // Filter by tab AND date
    const visible = sorted.filter(row => {
      const taskDate = row.display_date || row.origin_date;
      const taskTab = row.tab || 'work';
      return taskDate === currentDateStr && taskTab === activeTab;
    });

    if (activeTab === 'personal') {
      // Personal tab: user-defined sections with priority sub-sections
      const active = visible.filter(row => !row.done);
      const completed = visible.filter(row => row.done);

      personalSections.forEach(sectionName => {
        const sectionTasks = active.filter(r => r.category === sectionName);

        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = sectionName;
        label.dataset.sectionCategory = sectionName;
        list.appendChild(label);

        // Group by priority within each section
        const highItems = sectionTasks.filter(r => r.priority === 'HIGH');
        const medItems = sectionTasks.filter(r => r.priority === 'MED');
        const lowItems = sectionTasks.filter(r => r.priority === 'LOW');
        const noPriItems = sectionTasks.filter(r => !r.priority);

        if (highItems.length > 0 || medItems.length > 0 || lowItems.length > 0) {
          const highLabel = document.createElement('div');
          highLabel.className = 'section-label priority-section priority-high-label';
          highLabel.textContent = '● HIGH';
          highLabel.dataset.priorityZone = 'HIGH';
          highLabel.dataset.sectionCategory = sectionName;
          list.appendChild(highLabel);
          highItems.forEach(row => list.appendChild(createTaskEl(row)));

          const medLabel = document.createElement('div');
          medLabel.className = 'section-label priority-section priority-med-label';
          medLabel.textContent = '● MED';
          medLabel.dataset.priorityZone = 'MED';
          medLabel.dataset.sectionCategory = sectionName;
          list.appendChild(medLabel);
          medItems.forEach(row => list.appendChild(createTaskEl(row)));

          const lowLabel = document.createElement('div');
          lowLabel.className = 'section-label priority-section priority-low-label';
          lowLabel.textContent = '● LOW';
          lowLabel.dataset.priorityZone = 'LOW';
          lowLabel.dataset.sectionCategory = sectionName;
          list.appendChild(lowLabel);
          lowItems.forEach(row => list.appendChild(createTaskEl(row)));
        }

        noPriItems.forEach(row => list.appendChild(createTaskEl(row)));
      });

      // Tasks in sections that no longer exist
      const knownSections = new Set(personalSections);
      const orphaned = active.filter(r => !knownSections.has(r.category));
      if (orphaned.length > 0) {
        orphaned.forEach(row => {
          row.category = personalSections[0];
          list.appendChild(createTaskEl(row));
        });
      }

      if (completed.length > 0) {
        const divider = document.createElement('div');
        divider.className = 'section-label completed-label';
        divider.textContent = 'Completed';
        list.appendChild(divider);
        completed.forEach(row => list.appendChild(createTaskEl(row)));
      }
    } else {
      // Work tab: Students + Action Items with priority sub-sections
      const active = visible.filter(row => !row.done);
      const completed = visible.filter(row => row.done);

      const students = active.filter(r => r.category === 'Students');
      const actionItems = active.filter(r => r.category === 'Action Items');
      const otherActive = active.filter(r =>
        r.category !== 'Students' && r.category !== 'Action Items'
      );

      if (students.length > 0) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = 'Students';
        label.dataset.sectionCategory = 'Students';
        list.appendChild(label);
        students.forEach(row => list.appendChild(createTaskEl(row)));
      }

      if (actionItems.length > 0) {
        const label = document.createElement('div');
        label.className = 'section-label';
        label.textContent = 'Action Items';
        label.dataset.sectionCategory = 'Action Items';
        list.appendChild(label);

        const highItems = actionItems.filter(r => r.priority === 'HIGH');
        const medItems = actionItems.filter(r => r.priority === 'MED');
        const lowItems = actionItems.filter(r => r.priority === 'LOW');
        const noPriItems = actionItems.filter(r => !r.priority);

        const highLabel = document.createElement('div');
        highLabel.className = 'section-label priority-section priority-high-label';
        highLabel.textContent = '● HIGH';
        highLabel.dataset.priorityZone = 'HIGH';
        highLabel.dataset.sectionCategory = 'Action Items';
        list.appendChild(highLabel);
        highItems.forEach(row => list.appendChild(createTaskEl(row)));

        const medLabel = document.createElement('div');
        medLabel.className = 'section-label priority-section priority-med-label';
        medLabel.textContent = '● MED';
        medLabel.dataset.priorityZone = 'MED';
        medLabel.dataset.sectionCategory = 'Action Items';
        list.appendChild(medLabel);
        medItems.forEach(row => list.appendChild(createTaskEl(row)));

        const lowLabel = document.createElement('div');
        lowLabel.className = 'section-label priority-section priority-low-label';
        lowLabel.textContent = '● LOW';
        lowLabel.dataset.priorityZone = 'LOW';
        lowLabel.dataset.sectionCategory = 'Action Items';
        list.appendChild(lowLabel);
        lowItems.forEach(row => list.appendChild(createTaskEl(row)));

        noPriItems.forEach(row => list.appendChild(createTaskEl(row)));
      }

      if (otherActive.length > 0) {
        const categories = {};
        otherActive.forEach(row => {
          const cat = row.category || 'General';
          if (!categories[cat]) categories[cat] = [];
          categories[cat].push(row);
        });
        Object.entries(categories).forEach(([cat, items]) => {
          const label = document.createElement('div');
          label.className = 'section-label';
          label.textContent = cat;
          label.dataset.sectionCategory = cat;
          list.appendChild(label);
          items.forEach(row => list.appendChild(createTaskEl(row)));
        });
      }

      if (completed.length > 0) {
        const divider = document.createElement('div');
        divider.className = 'section-label completed-label';
        divider.textContent = 'Completed';
        list.appendChild(divider);
        completed.forEach(row => list.appendChild(createTaskEl(row)));
      }
    }

    updateProgress();
    checkEmpty();
  }
  // ── Load from Supabase ────────────────────────────────────────
  async function loadTasks() {
    setSyncStatus('syncing', '⟳ Loading...');
    const { data, error } = await db
      .from('tasks')
      .select('*')
      .order('position', { ascending: true });

    if (error) {
      setSyncStatus('error', '✕ Could not load: ' + error.message);
      console.error('Load error:', error);
      hideLoader();
      return;
    }

    renderAllTasks(data || []);
    setSyncStatus('synced', '✓ Synced');
    setTimeout(() => setSyncStatus('', ''), 2000);
    hideLoader();
  }

  function hideLoader() {
    const ol = document.getElementById('loadingOverlay');
    ol.classList.add('hidden');
    setTimeout(() => ol.style.display = 'none', 400);
  }

  // ── Real-time Subscription ────────────────────────────────────
  db.channel('tasks-realtime')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tasks' }, () => loadTasks())
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tasks' }, () => loadTasks())
    .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'tasks' }, () => loadTasks())
    .subscribe((status) => {
      console.log('Realtime tasks status:', status);
    });

  db.channel('sections-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'personal_sections' }, async () => {
      await loadPersonalSections();
      await loadTasks();
    })
    .subscribe((status) => {
      console.log('Realtime sections status:', status);
    });

  // ── CRUD ──────────────────────────────────────────────────────
  async function addTask() {
    const name = document.getElementById('taskName').value.trim();
    if (!name) {
      document.getElementById('taskName').focus();
      return;
    }
    const note = document.getElementById('taskNote').value.trim();
    const origin = formatShortDate(selectedDate);
    const position = document.querySelectorAll('.task').length;

    let category, priority, tab;
    if (activeTab === 'personal') {
      category = document.getElementById('taskPersonalSection').value;
      priority = document.getElementById('taskPriority').value || null;
      tab = 'personal';
    } else {
      category = document.getElementById('taskCategory').value;
      priority = category === 'Action Items'
        ? (document.getElementById('taskPriority').value || null)
        : null;
      tab = 'work';
    }

    setSyncStatus('syncing', '⟳ Saving...');
    const { error } = await db.from('tasks').insert([{
      name,
      note,
      category,
      priority,
      tab,
      origin_date: origin,
      display_date: origin,
      fwd_count: 0,
      done: false,
      position
    }]);

    if (error) {
      setSyncStatus('error', '✕ Save failed: ' + error.message);
      console.error('Insert error:', error);
      return;
    }

    setSyncStatus('synced', '✓ Saved');
    setTimeout(() => setSyncStatus('', ''), 2000);
    closeModal();
    await loadTasks();
  }

  async function toggleTask(el) {
    const id = el.dataset.id;
    const done = !el.classList.contains('done');
    el.classList.toggle('done');
    updateProgress();
    await db.from('tasks').update({ done }).eq('id', id);
  }

  async function forwardTask(task) {
    const id = task.dataset.id;
    const count = (parseInt(task.dataset.fwdCount) || 0) + 1;
    task.dataset.fwdCount = count;

    const currentDisplayDate = task.dataset.displayDate || task.dataset.originDate;
    const parts = currentDisplayDate.match(/(\w+)\s+(\d+),\s+(\d+)/);
    let baseDate;
    if (parts) {
      baseDate = new Date(`${parts[1]} ${parts[2]}, ${parts[3]}`);
    } else {
      baseDate = new Date(selectedDate);
    }

    const next = new Date(baseDate);
    next.setDate(next.getDate() + 1);
    const nextStr = formatShortDate(next);
    task.dataset.displayDate = nextStr;

    showToast(`Forwarded to ${DAYS_FULL[next.getDay()]}, ${MONTH_SHORT[next.getMonth()]} ${next.getDate()}`);

    task.style.transition = 'opacity 0.3s, transform 0.3s';
    task.style.opacity = '0';
    task.style.transform = 'translateX(10px)';
    setTimeout(() => {
      task.remove();
      cleanEmptySections();
      updateProgress();
      checkEmpty();
    }, 300);

    await db.from('tasks').update({ fwd_count: count, display_date: nextStr }).eq('id', id);
  }

  async function deleteTask(el) {
    const id = el.dataset.id;
    el.style.transition = 'opacity 0.2s, transform 0.2s';
    el.style.opacity = '0';
    el.style.transform = 'translateX(10px)';
    setTimeout(async () => {
      el.remove();
      cleanEmptySections();
      updateProgress();
      checkEmpty();
      if (id) await db.from('tasks').delete().eq('id', id);
    }, 200);
  }

  // ── Add Modal ─────────────────────────────────────────────────
  function openModal() {
    if (activeTab === 'personal') {
      document.getElementById('categoryGroup').style.display = 'none';
      document.getElementById('personalSectionGroup').style.display = 'block';
      document.getElementById('priorityGroup').style.display = 'block';
      document.getElementById('modalTitle').textContent = 'Add Personal Item';
      populateSectionDropdown('taskPersonalSection');
    } else {
      document.getElementById('categoryGroup').style.display = 'block';
      document.getElementById('personalSectionGroup').style.display = 'none';
      document.getElementById('modalTitle').textContent = 'Add Item';
      togglePrioritySelect();
    }
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('taskName').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.getElementById('taskName').value = '';
    document.getElementById('taskNote').value = '';
    document.getElementById('taskCategory').value = 'Students';
    document.getElementById('taskPriority').value = '';
    document.getElementById('priorityGroup').style.display = 'none';
    document.getElementById('categoryGroup').style.display = 'block';
    document.getElementById('personalSectionGroup').style.display = 'none';
  }

  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('taskName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  document.getElementById('taskNote').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) addTask();
  });

  // ── Edit Modal ────────────────────────────────────────────────
  function openEditModal(taskEl) {
    const id = taskEl.dataset.id;
    const name = taskEl.querySelector('.task-title').childNodes[0].textContent.trim();
    const noteEl = taskEl.querySelector('.task-sub');
    const note = noteEl ? noteEl.textContent : '';
    const category = taskEl.dataset.category || '';
    const priority = taskEl.dataset.priority || '';
    const tab = taskEl.dataset.tab || activeTab;

    document.getElementById('editTaskId').value = id;
    document.getElementById('editTaskName').value = name;
    document.getElementById('editTaskNote').value = note;

    if (tab === 'personal') {
      document.getElementById('editCategoryGroup').style.display = 'none';
      document.getElementById('editPersonalSectionGroup').style.display = 'block';
      document.getElementById('editPriorityGroup').style.display = 'block';
      populateSectionDropdown('editTaskPersonalSection');
      document.getElementById('editTaskPersonalSection').value = category;
      document.getElementById('editTaskPriority').value = priority;
    } else {
      document.getElementById('editCategoryGroup').style.display = 'block';
      document.getElementById('editPersonalSectionGroup').style.display = 'none';
      document.getElementById('editTaskCategory').value = category;
      document.getElementById('editTaskPriority').value = priority;
      toggleEditPrioritySelect();
    }

    document.getElementById('editModalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('editTaskName').focus(), 100);
  }

  function closeEditModal() {
    document.getElementById('editModalOverlay').classList.remove('open');
    document.getElementById('editCategoryGroup').style.display = 'block';
    document.getElementById('editPersonalSectionGroup').style.display = 'none';
  }

  function toggleEditPrioritySelect() {
    const cat = document.getElementById('editTaskCategory').value;
    document.getElementById('editPriorityGroup').style.display =
      cat === 'Action Items' ? 'block' : 'none';
  }

  async function saveEdit() {
    const id = document.getElementById('editTaskId').value;
    const name = document.getElementById('editTaskName').value.trim();
    if (!name) {
      document.getElementById('editTaskName').focus();
      return;
    }
    const note = document.getElementById('editTaskNote').value.trim();

    let category, priority;
    if (activeTab === 'personal') {
      category = document.getElementById('editTaskPersonalSection').value;
      priority = document.getElementById('editTaskPriority').value || null;
    } else {
      category = document.getElementById('editTaskCategory').value;
      priority = category === 'Action Items'
        ? (document.getElementById('editTaskPriority').value || null)
        : null;
    }

    setSyncStatus('syncing', '⟳ Saving...');
    const { error } = await db.from('tasks')
      .update({ name, note, category, priority })
      .eq('id', id);

    if (error) {
      setSyncStatus('error', '✕ Save failed: ' + error.message);
      console.error('Edit error:', error);
      return;
    }

    setSyncStatus('synced', '✓ Saved');
    setTimeout(() => setSyncStatus('', ''), 2000);
    closeEditModal();
    showToast('Task updated');
    await loadTasks();
  }

  document.getElementById('editModalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  document.getElementById('editTaskName').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveEdit();
  });

  document.getElementById('editTaskNote').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) saveEdit();
  });

  document.getElementById('sectionMgrOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeSectionMgr();
  });

  // ── Helpers ───────────────────────────────────────────────────
  function cleanEmptySections() {
    const list = document.getElementById('taskList');
    list.querySelectorAll('.section-label').forEach(label => {
      if (label.dataset.priorityZone) return;
      if (label.classList.contains('completed-label')) return;
      let next = label.nextSibling;
      let hasTasks = false;
      while (next) {
        if (next.classList && next.classList.contains('section-label')) break;
        if (next.classList && next.classList.contains('task')) { hasTasks = true; break; }
        next = next.nextSibling;
      }
      if (!hasTasks) label.remove();
    });
  }

  function updateProgress() {
    const tasks = document.querySelectorAll('.task');
    const done = document.querySelectorAll('.task.done').length;
    const total = tasks.length;
    const pct = total ? Math.round((done / total) * 100) : 0;
    document.getElementById('bar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = total
      ? `${done} of ${total} complete`
      : '0 of 0 complete';
  }

  function checkEmpty() {
    document.getElementById('emptyState').style.display =
      document.querySelectorAll('.task').length === 0 ? 'block' : 'none';
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;')
              .replace(/</g,'&lt;')
              .replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;');
  }

  // ── Init ──────────────────────────────────────────────────────
  async function init() {
    await loadPersonalSections();
    await loadTasks();
  }

  init();
</script>
